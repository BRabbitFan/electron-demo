{% if platform.system() == 'Windows' %}

[settings]
build_type=Release
arch=x86_64
os=Windows
compiler=msvc
compiler.cppstd=20
compiler.runtime=static
compiler.version=194

{% elif platform.system() == 'Darwin' %}

[settings]
build_type=Release
arch=armv8
os=Macos
compiler=apple-clang
compiler.cppstd=20
compiler.libcxx=libc++
compiler.version=16

{% else %}

[settings]
build_type=Release
arch=x86_64
os=Linux
compiler=clang
compiler.cppstd=20
compiler.libcxx=libstdc++
compiler.version=18

[buildenv]
CC=clang
CXX=clang++

{% endif %}

[conf]
tools.cmake.cmaketoolchain:generator=Ninja
