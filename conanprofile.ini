[settings]
build_type=Release
{% if platform.system() == "Windows" %}
arch=x86_64
os=Windows
compiler=msvc
compiler.cppstd=20
compiler.runtime=dynamic
compiler.version=195
{% elif platform.system() == "Darwin" %}
arch=arm64
os=Macos
compiler=apple-clang
compiler.cppstd=20
compiler.libcxx=libc++
compiler.version=16
{% else %}
arch=x86_64
os=Linux
compiler=clang
compiler.cppstd=20
compiler.libcxx=libstdc++11
compiler.version=18
{% endif %}

[conf]
tools.cmake.cmaketoolchain:generator=Ninja
